  <g transform="translate(20, 18)" fill="#394735">
    <!-- Bird body -->
    <path d="M50 35 C55 28, 65 22, 72 20 C70 25, 68 30, 65 34 C62 38, 58 40, 54 42 C50 44, 46 44, 42 42 C38 40, 35 36, 34 32 C33 28, 34 24, 37 22 C40 20, 44 20, 47 22 C49 24, 50 28, 50 35Z" opacity="0.9"/>
